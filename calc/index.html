<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Calculator</title>

    <style>
        :root {
            --bg-start: #0f172a;
            --bg-end: #1d4ed8;
            --panel: rgba(15, 23, 42, 0.82);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text: #f8fafc;
            --muted: #94a3b8;
            --number: #1e293b;
            --number-hover: #334155;
            --operator: #2563eb;
            --operator-hover: #3b82f6;
            --accent: #f97316;
            --shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(56, 189, 248, 0.35), transparent 35%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
        }

        .container {
            width: min(100%, 380px);
            padding: 20px;
            border-radius: 28px;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            display: grid;
            gap: 16px;
        }

        .display {
            min-height: 96px;
            padding: 20px;
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.65));
            border: 1px solid rgba(148, 163, 184, 0.18);
            display: flex;
            align-items: end;
            justify-content: flex-end;
            text-align: right;
            font-size: clamp(2rem, 8vw, 3.3rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text);
            overflow: hidden;
            word-break: break-all;
            min-width: 0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        button {
            appearance: none;
            border: 0;
            border-radius: 18px;
            min-height: 64px;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease, background-color 160ms ease, filter 160ms ease;
            box-shadow: 0 10px 18px rgba(15, 23, 42, 0.22);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        button:active {
            transform: translateY(1px) scale(0.98);
        }

        .number {
            background: linear-gradient(180deg, #334155, var(--number));
        }

        .number:hover {
            background: linear-gradient(180deg, #475569, var(--number-hover));
        }

        .operation {
            background: linear-gradient(180deg, #3b82f6, var(--operator));
        }

        .operation:hover {
            background: linear-gradient(180deg, #60a5fa, var(--operator-hover));
        }

        .clear {
            background: linear-gradient(180deg, #fb923c, var(--accent));
        }

        .clear:hover {
            background: linear-gradient(180deg, #fdba74, #ea580c);
        }

        .equals {
            background: linear-gradient(180deg, #22c55e, #16a34a);
        }

        .equals:hover {
            background: linear-gradient(180deg, #4ade80, #22c55e);
        }

        .wide {
            grid-column: span 2;
        }

        @media (max-width: 420px) {
            body {
                padding: 14px;
            }

            .container {
                padding: 16px;
                border-radius: 24px;
            }

            .display {
                min-height: 84px;
                padding: 16px;
            }

            button {
                min-height: 58px;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="display">  </div>
    <div class="buttons">
        <button type="button" class="number">1</button>
        <button type="button" class="number">2</button>
        <button type="button" class="number">3</button>
        <button type="button" class="operation">+</button>
        <button type="button" class="number">4</button>
        <button type="button" class="number">5</button>
        <button type="button" class="number">6</button>
        <button type="button" class="operation">-</button>
        <button type="button" class="number">7</button>
        <button type="button" class="number">8</button>
        <button type="button" class="number">9</button>
        <button type="button" class="operation">*</button>
        <button type="button" class="wide number">0</button>
        <button type="button" class="operation">/</button>
        <button type="button" class="clear" onclick="del()">C</button>
        <button type="button" class="equals" onclick="res()">=</button>
    </div>

</div>


<script>

const display = document.getElementsByClassName("display")[0]
const buttons = document.querySelectorAll('.number, .operation');

buttons.forEach(button => {
    button.addEventListener('click', () => {
        display.textContent += button.textContent;
    });
});

function res()  {
try{
      display.textContent  = eval( display.textContent )  }
      catch {
        display.textContent = "ERROR" 
      }
}

function del() { 
    display.textContent = ""
}




</script>
</body>
</html>
