<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    
 
 <select name="main-dropdown" id="MainDropdown">
    <option value="ButtonDropdown" class=" ButtonDropdown volvo active">Volvo</option>
    <option value="ButtonDropdown "class = " ButtonDropdown saab">Saab</option>
    <option value="ButtonDropdown "class=" ButtonDropdown mercedes">Mercedes</option>
    <option value="ButtonDropdown " class =" ButtonDropdown audi">Audi</option>
 </select>






<script>
const dropdown = document.getElementById("MainDropdown");
const options = document.getElementsByClassName("ButtonDropdown");

dropdown.addEventListener("change", () => {

    // remove active from all options
    for (let i = 0; i < options.length; i++) {
        options[i].classList.remove("active");
    }

    // add active to selected option
    dropdown.options[dropdown.selectedIndex].classList.add("active");

    console.log("Selected:",
        dropdown.options[dropdown.selectedIndex].text);
});
</script>

</body>
</html>
